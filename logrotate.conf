# ARL Docker Logrotate Configuration
# Place this file in /etc/logrotate.d/arl-docker

/path/to/arl_web.log {
    daily
    rotate 7
    compress
    delaycompress
    missingok
    notifempty
    create 0644 root root
    sharedscripts
    postrotate
        docker-compose restart web > /dev/null 2>&1
    endscript
}

/path/to/arl_worker.log {
    daily
    rotate 7
    compress
    delaycompress
    missingok
    notifempty
    create 0644 root root
    sharedscripts
    postrotate
        docker-compose restart worker > /dev/null 2>&1
    endscript
}
